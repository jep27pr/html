<script>
let lastRead = "";
let lastTimestamp = 0;

function onScanSuccess(decodedText) {

    const now = Date.now();

    // evita duplicati entro 2 secondi
    if(
        decodedText === lastRead &&
        (now - lastTimestamp) < 2000
    ){
        return;
    }

    lastRead = decodedText;
    lastTimestamp = now;

    document.getElementById("output").textContent = decodedText;

    const li = document.createElement("li");
    li.textContent =
        new Date().toLocaleTimeString() +
        " - " +
        decodedText;

    document
        .getElementById("history")
        .prepend(li);
}
