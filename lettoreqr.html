<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: auto;
        }

        .result {
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 0 6px rgba(0,0,0,0.15);
        }

        #output {
            margin-top: 10px;
            font-size: 18px;
            color: green;
            word-break: break-word;
        }

        .history {
            margin-top: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }

        .history ul {
            background: white;
            border-radius: 10px;
            padding: 15px 30px;
            box-shadow: 0 0 6px rgba(0,0,0,0.15);
        }

        .history li {
            margin-bottom: 8px;
            word-break: break-word;
        }
    </style>
</head>
<body>

    <h1>Scanner QR Real-Time</h1>

    <div id="reader"></div>

    <div class="result">
        <strong>Ultimo QR trovato:</strong>
        <div id="output">Nessun QR rilevato</div>
    </div>

    <div class="history">
        <h3>Storico</h3>
        <ul id="history"></ul>
    </div>

    <script>

        let ultimoCodice = "";
        let ultimoTimestamp = 0;

        function onScanSuccess(decodedText) {

            const adesso = Date.now();

            if (
                decodedText === ultimoCodice &&
                (adesso - ultimoTimestamp) < 2000
            ) {
                return;
            }

            ultimoCodice = decodedText;
            ultimoTimestamp = adesso;

            document.getElementById("output").textContent = decodedText;

            const li = document.createElement("li");
            li.textContent =
                new Date().toLocaleTimeString() +
                " - " +
                decodedText;

            document
                .getElementById("history")
                .prepend(li);
        }

        async function avviaScanner() {

            try {

                const devices = await Html5Qrcode.getCameras();

                if (!devices.length) {
                    document.getElementById("output").textContent =
                        "Nessuna fotocamera trovata";
                    return;
                }

                let cameraId = devices[0].id;

                const posteriore = devices.find(device =>
                    device.label.toLowerCase().includes("back") ||
                    device.label.toLowerCase().includes("rear")
                );

                if (posteriore) {
                    cameraId = posteriore.id;
                }

                const html5QrCode = new Html5Qrcode("reader");

                await html5QrCode.start(
                    cameraId,
                    {
                        fps: 1,
                        qrbox: 250
                    },
                    onScanSuccess
                );

            } catch (errore) {

                document.getElementById("output").textContent =
                    "Errore: " + errore;

                console.error(errore);
            }
        }

        avviaScanner();

    </script>

</body>
</html>
